<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Appointment Confirmation</title>

<style>

body{

font-family:Arial,Helvetica,sans-serif;
background:#f4f4f4;
padding:40px;

}

.container{

background:white;
max-width:700px;
margin:auto;
padding:35px;
border-radius:10px;

}

table{

width:100%;
border-collapse:collapse;

}

td{

padding:10px;
border-bottom:1px solid #ddd;

}

h2{

color:#198754;

}

.footer{

margin-top:30px;
font-size:13px;
color:gray;

}

</style>

</head>

<body>

<div class="container">

<h2>Appointment Confirmed</h2>

<p>

Hello <strong>{{ patient }}</strong>,

</p>

<p>

Your appointment has been confirmed.

</p>

<table>

<tr>

<td><strong>Doctor</strong></td>

<td>{{ doctor }}</td>

</tr>

<tr>

<td><strong>Date</strong></td>

<td>{{ date }}</td>

</tr>

<tr>

<td><strong>Time</strong></td>

<td>{{ time }}</td>

</tr>

</table>

<p>

Please arrive at least 10 minutes before your appointment.

</p>

<div class="footer">

Mini HMS Team

</div>

</div>

</body>

</html>
