<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Welcome</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 40px;
        }

        .container {
            background: white;
            max-width: 650px;
            margin: auto;
            padding: 35px;
            border-radius: 10px;
        }

        h2 {
            color: #0d6efd;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
        }

        .footer {
            margin-top: 30px;
            color: gray;
            font-size: 13px;
        }
    </style>

</head>

<body>

<div class="container">

    <h2>Welcome to Mini Hospital Management System</h2>

    <p>

        Hello <strong>{{ name }}</strong>,

    </p>

    <p>

        Your account has been created successfully.

    </p>

    <p>

        You can now login and start using the Hospital Management System.

    </p>

    <p>

        Thank you for joining us.

    </p>

    <div class="footer">

        Mini HMS Team

    </div>

</div>

</body>

</html>
