<!DOCTYPE html>
<html>

<body>

<p>Hello {{ patient }},</p>

<p>This is a reminder that you have an appointment.</p>

<table>
<tr>
<td><strong>Doctor</strong></td>

<p>Please arrive 15 minutes early.</p>

<p>Mini Hospital Management System</p>

</body>
</html>
